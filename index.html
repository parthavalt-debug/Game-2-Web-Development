<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Water</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#1a1a1a, #2c3e50);
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#container {
    text-align: center;
    position: relative;
}

#timer {
    position: absolute;
    top: -30px;
    left: 0;
    font-size: 18px;
}

#controls {
    position: absolute;
    top: -35px;
    right: 0;
    display: flex;
    gap: 8px;
}

.control-btn {
    padding: 6px 12px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    background: #00adb5;
    color: white;
    cursor: pointer;
}

#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    color: #00d4ff;
    display: none;
}

canvas {
    display: block;
    margin: auto;
    border: 2px solid #222;
    border-radius: 16px;
}

#gameOver {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #3498db;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>
<div id="container">
<h1>🕷️ Dodge Water</h1>
<div id="timer">Time: 0s</div>

<div id="controls">
  <button class="control-btn" id="musicBtn" onclick="toggleMusic()">Music: ON</button>
  <button class="control-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
</div>

<div id="message">Droplet Frequency Increased!</div>
<canvas id="gameCanvas" width="800" height="500"></canvas>
</div>

<div id="gameOver">
    <h2>Game Over</h2>
    <p id="finalTime"></p>
    <button onclick="restart()">Play Again</button>
</div>

<audio id="rainSound" loop autoplay>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c3b8c9f6b.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic" loop>
  <source src="rain.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let spider, drops, gameOver, startTime, elapsedTime, dropRate, increased;
let musicOn = true;
let paused = false;

function init() {
    spider = { x: 380, y: 440, speed: 6 };
    drops = [];
    gameOver = false;
    paused = false;
    startTime = Date.now();
    elapsedTime = 0;
    dropRate = 0.025;
    increased = false;

    document.getElementById("gameOver").style.display = "none";
    document.getElementById("message").style.display = "none";
    document.getElementById("pauseBtn").innerText = "Pause";

    document.getElementById("rainSound").volume = 0.2;
    const music = document.getElementById("bgMusic");
    music.volume = 0.2;
    if (musicOn) music.play();
}

init();

function toggleMusic() {
    const music = document.getElementById("bgMusic");
    musicOn = !musicOn;

    if (musicOn) {
        music.play();
        document.getElementById("musicBtn").innerText = "Music: ON";
    } else {
        music.pause();
        document.getElementById("musicBtn").innerText = "Music: OFF";
    }
}

function togglePause() {
    paused = !paused;
    document.getElementById("pauseBtn").innerText = paused ? "Resume" : "Pause";
}

function spawnDrop() {
    if (Math.random() < dropRate) {
        drops.push({
            x: Math.random() * canvas.width,
            y: -10,
            speed: 2 + Math.random() * 2
        });
    }
}

function update() {
    if (gameOver || paused) return;

    elapsedTime = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText = "Time: " + elapsedTime + "s";

    if (elapsedTime >= 30 && !increased) {
        dropRate = 0.04;
        increased = true;
        let msg = document.getElementById("message");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2000);
    }

    if (keys["ArrowLeft"]) spider.x -= spider.speed;
    if (keys["ArrowRight"]) spider.x += spider.speed;

    spider.x = Math.max(0, Math.min(canvas.width - 30, spider.x));

    spawnDrop();

    for (let d of drops) {
        d.y += d.speed;

        if (
            d.x > spider.x &&
            d.x < spider.x + 30 &&
            d.y > 440 &&
            d.y < 470
        ) {
            endGame();
        }
    }

    drops = drops.filter(d => d.y < canvas.height);
}

function drawBackground() {
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, "#2c3e50");
    grad.addColorStop(1, "#000000");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawRain() {
    ctx.strokeStyle = "rgba(173,216,230,0.7)";
    ctx.lineWidth = 2;
    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + 10);
        ctx.stroke();
    }
}

function drawSpider() {
    ctx.font = "30px Arial";
    ctx.fillText("🕷️", spider.x, 460);
}

function endGame() {
    gameOver = true;
    document.getElementById("finalTime").innerText = "You survived: " + elapsedTime + " seconds";
    document.getElementById("gameOver").style.display = "flex";
}

function restart() {
    init();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground();
    update();
    drawRain();
    drawSpider();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
